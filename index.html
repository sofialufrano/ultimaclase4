<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preentrega</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="figma-export">
    <section class="desktop-screen desktop-screen-1">
      <img src="desktoppage1.svg" alt="Pagina 1" class="figma-page">
      <img src="desktoppage1-select.svg" alt="" class="desktop-1-overlay" aria-hidden="true">
      <img src="desktoppage1-header.svg" alt="" class="desktop-1-header" aria-hidden="true">
      <button class="header-word header-word-inicio" type="button" aria-label="Inicio">
        <span class="header-word-base"></span>
        <span class="header-word-active"></span>
      </button>
      <button class="header-word header-word-nosotros" type="button" aria-label="Nosotros">
        <span class="header-word-base"></span>
        <span class="header-word-active"></span>
      </button>
      <button class="header-word header-word-funcion" type="button" aria-label="Funcion">
        <span class="header-word-base"></span>
        <span class="header-word-active"></span>
      </button>
      <button class="header-word header-word-caja" type="button" aria-label="Caja">
        <span class="header-word-base"></span>
        <span class="header-word-active"></span>
      </button>
      <button class="header-word header-word-app" type="button" aria-label="App">
        <span class="header-word-base"></span>
        <span class="header-word-active"></span>
      </button>
    </section>
    <section class="desktop-screen desktop-screen-2">
      <img src="desktoppage2.svg" alt="Pagina 2" class="figma-page">
      <img src="desktoppage2-circles.svg" alt="" class="desktop-2-art" aria-hidden="true">
      <button class="desktop-2-icon desktop-2-icon-1" type="button" aria-label="Icono 1">
        <span class="desktop-2-icon-image"></span>
      </button>
      <button class="desktop-2-icon desktop-2-icon-2" type="button" aria-label="Icono 2">
        <span class="desktop-2-icon-image"></span>
      </button>
      <button class="desktop-2-icon desktop-2-icon-3" type="button" aria-label="Icono 3">
        <span class="desktop-2-icon-image"></span>
      </button>
    </section>
    <section class="desktop-screen desktop-screen-3">
      <img src="desktoppage3.svg" alt="Pagina 3" class="figma-page">
      <img src="desktoppage3-overlay-1.svg" alt="" class="desktop-3-art desktop-3-art-1" aria-hidden="true">
      <img src="desktoppage3-overlay-2.svg" alt="" class="desktop-3-art desktop-3-art-2" aria-hidden="true">
    </section>
    <section class="desktop-screen desktop-screen-4">
      <img src="desktoppage4.svg" alt="Pagina 4" class="figma-page">
      <img src="desktoppage4-overlay-1.svg" alt="" class="desktop-4-art desktop-4-art-1" aria-hidden="true">
      <img src="desktoppage4-overlay-2.svg" alt="" class="desktop-4-art desktop-4-art-2" aria-hidden="true">
    </section>
    <section class="desktop-screen desktop-screen-5">
      <img src="desktoppage5.svg" alt="Pagina 5" class="figma-page">
      <img src="desktoppage5-overlay-1.svg" alt="" class="desktop-5-art desktop-5-art-1" aria-hidden="true">
      <img src="desktoppage5-overlay-2.svg" alt="" class="desktop-5-art desktop-5-art-2" aria-hidden="true">
      <button class="desktop-5-icon desktop-5-icon-1" type="button" aria-label="Icono 1">
        <span class="desktop-5-icon-image"></span>
      </button>
      <button class="desktop-5-icon desktop-5-icon-2" type="button" aria-label="Icono 2">
        <span class="desktop-5-icon-image"></span>
      </button>
      <button class="desktop-5-icon desktop-5-icon-3" type="button" aria-label="Icono 3">
        <span class="desktop-5-icon-image"></span>
      </button>
    </section>
    <section class="desktop-screen desktop-screen-6">
      <img src="desktoppage6.svg" alt="Pagina 6" class="figma-page">
      <div class="desktop-6-carousel" aria-hidden="true">
        <img src="desktoppage6-slide-1.svg" alt="" class="desktop-6-slide is-active">
        <img src="desktoppage6-slide-2.svg" alt="" class="desktop-6-slide">
        <img src="desktoppage6-slide-3.svg" alt="" class="desktop-6-slide">
        <img src="desktoppage6-slide-4.svg" alt="" class="desktop-6-slide">
      </div>
      <img src="desktoppage6-controls.svg" alt="" class="desktop-6-controls-art" aria-hidden="true">
      <button class="desktop-6-control desktop-6-control-prev" type="button" aria-label="Anterior"></button>
      <button class="desktop-6-control desktop-6-control-next" type="button" aria-label="Siguiente"></button>
    </section>
    <section class="desktop-screen desktop-screen-7">
      <img src="desktoppage7.svg" alt="Pagina 7" class="figma-page">
      <img src="desktoppage7-overlay-1.svg" alt="" class="desktop-7-art desktop-7-art-1" aria-hidden="true">
      <img src="desktoppage7-overlay-2.svg" alt="" class="desktop-7-art desktop-7-art-2" aria-hidden="true">
    </section>
    <section class="desktop-screen desktop-screen-8">
      <img src="desktoppage8.svg" alt="Pagina 8" class="figma-page">
      <img src="desktoppage8-overlay-1.svg" alt="" class="desktop-8-art desktop-8-art-1" aria-hidden="true">
      <img src="desktoppage8-overlay-2.svg" alt="" class="desktop-8-art desktop-8-art-2" aria-hidden="true">
      <button class="desktop-8-card desktop-8-card-1" type="button" aria-label="Cuadrado 1">
        <span class="desktop-8-card-image"></span>
      </button>
      <button class="desktop-8-card desktop-8-card-2" type="button" aria-label="Cuadrado 2">
        <span class="desktop-8-card-image"></span>
      </button>
      <button class="desktop-8-card desktop-8-card-3" type="button" aria-label="Cuadrado 3">
        <span class="desktop-8-card-image"></span>
      </button>
    </section>
    <section class="desktop-screen desktop-screen-9">
      <img src="desktoppage9.svg" alt="Pagina 9" class="figma-page">
      <img src="desktoppage9-overlay-1.svg" alt="" class="desktop-9-art desktop-9-art-1" aria-hidden="true">
      <img src="desktoppage9-overlay-2.svg" alt="" class="desktop-9-art desktop-9-art-2" aria-hidden="true">
      <div class="desktop-9-carousel" aria-hidden="true">
        <img src="desktoppage9-slide-1.svg" alt="" class="desktop-9-slide is-active">
        <img src="desktoppage9-slide-2.svg" alt="" class="desktop-9-slide">
        <img src="desktoppage9-slide-3.svg" alt="" class="desktop-9-slide">
      </div>
      <button class="desktop-9-control desktop-9-control-prev" type="button" aria-label="Anterior"></button>
      <button class="desktop-9-control desktop-9-control-next" type="button" aria-label="Siguiente"></button>
    </section>
    <section class="desktop-screen desktop-screen-10">
      <img src="desktoppage10.svg" alt="Pagina 10" class="figma-page">
    </section>
  </main>
  <header class="mobile-fixed-header" aria-label="Navegacion mobile">
    <a class="mobile-header-logo" href="#mobile-screen-1" aria-label="Ir al inicio">hp</a>
    <button class="mobile-menu-button" type="button" aria-label="Abrir menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="mobile-menu" aria-label="Menu mobile">
      <a href="#mobile-screen-1">Inicio</a>
      <a href="#mobile-screen-3">Nosotros</a>
      <a href="#mobile-screen-5">Funcion</a>
      <a href="#mobile-screen-4">Caja</a>
      <a href="#mobile-screen-9">App</a>
    </nav>
  </header>

  <main class="mobile-export" aria-label="Version mobile">
    <section class="mobile-screen" id="mobile-screen-1">
      <div class="mobile-shot-crop mobile-shot-first">
        <img src="mobile-page-1.svg" alt="Pagina mobile 1" class="mobile-page">
      </div>
    </section>
    <section class="mobile-screen" id="mobile-screen-2">
      <div class="mobile-shot-crop">
        <img src="mobile-page-2.svg" alt="Pagina mobile 2" class="mobile-page">
      </div>
    </section>
    <section class="mobile-screen" id="mobile-screen-3">
      <div class="mobile-shot-crop">
        <img src="mobile-page-3.svg" alt="Pagina mobile 3" class="mobile-page">
      </div>
    </section>
    <section class="mobile-screen" id="mobile-screen-4">
      <div class="mobile-shot-crop">
        <img src="mobile-page-4.svg" alt="Pagina mobile 4" class="mobile-page">
      </div>
    </section>
    <section class="mobile-screen" id="mobile-screen-5">
      <div class="mobile-shot-crop">
        <img src="mobile-page-5.svg" alt="Pagina mobile 5" class="mobile-page">
      </div>
    </section>
    <section class="mobile-screen" id="mobile-screen-6">
      <div class="mobile-shot-crop mobile-carousel" data-mobile-carousel="moments">
        <img src="mobile-page-6.svg" alt="Pagina mobile 6" class="mobile-page mobile-carousel-image">
        <button class="mobile-carousel-control mobile-carousel-prev" type="button" aria-label="Anterior"></button>
        <button class="mobile-carousel-control mobile-carousel-next" type="button" aria-label="Siguiente"></button>
      </div>
    </section>
    <section class="mobile-screen" id="mobile-screen-7">
      <div class="mobile-shot-crop">
        <img src="mobile-page-7.svg" alt="Pagina mobile 7" class="mobile-page">
      </div>
    </section>
    <section class="mobile-screen" id="mobile-screen-8">
      <div class="mobile-shot-crop">
        <img src="mobile-page-8.svg" alt="Pagina mobile 8" class="mobile-page">
      </div>
    </section>
    <section class="mobile-screen" id="mobile-screen-9">
      <div class="mobile-shot-crop mobile-carousel" data-mobile-carousel="app">
        <img src="mobile-page-9.svg" alt="Pagina mobile 9" class="mobile-page mobile-carousel-image">
        <button class="mobile-carousel-control mobile-carousel-prev" type="button" aria-label="Anterior"></button>
        <button class="mobile-carousel-control mobile-carousel-next" type="button" aria-label="Siguiente"></button>
      </div>
    </section>
    <section class="mobile-screen" id="mobile-screen-10">
      <div class="mobile-shot-crop">
        <img src="mobile-page-10.svg" alt="Pagina mobile 10" class="mobile-page">
      </div>
    </section>
    <section class="mobile-screen" id="mobile-screen-11">
      <div class="mobile-shot-crop">
        <img src="mobile-page-11.svg" alt="Pagina mobile 11" class="mobile-page">
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
